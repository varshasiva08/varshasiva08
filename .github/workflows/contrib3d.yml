name: 3D contribution graph

on:
  schedule:
    - cron: "0 0 * * *"   # regenerates once a day
  workflow_dispatch:        # lets you trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          username: varshasiva08

      - name: commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -f ./profile-3d-contrib/*.svg
          git commit -m "generate 3d contribution graph" || exit 0
          git push
